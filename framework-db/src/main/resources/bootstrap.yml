spring:
  application:
    name: framework-db # 应用名称
  profiles:
    active: local # 指定环境，默认加载 default 环境
  cloud:
    consul:
      # Consul 服务器地址
      host: 192.168.0.5
      port: 8500
      # 配置中心相关配置
      config:
        # 指定配置格式为 yaml
        format: YAML
        # Consul 的 Key/Values 中的 Key，Value 对应整个配置文件
        data-key: data
        profile-separator: '-'
      discovery:
        enabled: true
        register: true
        deregister: true
        prefer-ip-address: true
        health-check-interval: 10s
        health-check-critical-timeout: 30s
        instance-id: ${spring.application.name}:${server.port}
        heartbeat:
          enabled: true

server:
  port: 8080
